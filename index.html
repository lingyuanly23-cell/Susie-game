<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>五行闯关</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Arial,sans-serif}
#app{width:480px;max-width:100vw}
#hud{background:#222;color:#fff;padding:6px 10px;display:flex;justify-content:space-between;font-size:13px;border:2px solid #555;border-bottom:0}
canvas{display:block;width:100%;border:2px solid #555}
#btns{background:#1a1a1a;border:2px solid #555;border-top:0;padding:8px 10px;display:flex;justify-content:space-between}
.btn{width:54px;height:54px;font-size:20px;background:#444;color:#fff;border:2px solid #666;border-radius:8px;cursor:pointer;touch-action:none;user-select:none}
#bj{width:68px;background:#c0392b;border-color:#e74c3c}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <span id="hLv">⚔️ 第一关·金</span>
    <span id="hHp">❤️❤️❤️</span>
    <span id="hSc">💰 0</span>
  </div>
  <canvas id="cv" width="480" height="320"></canvas>
  <div id="btns">
    <div style="display:flex;gap:8px">
      <button class="btn" id="bl">◀</button>
      <button class="btn" id="br">▶</button>
    </div>
    <button class="btn" id="bj">跳</button>
  </div>
</div>
<script>
const cv=document.getElementById('cv');
const g=cv.getContext('2d');
const W=480,H=320,TS=32,GY=288;

const themes=[
  {name:'⚔️ 第一关·金',bg:'#aac4de',gCol:'#888899',pCol:'#c8a020',tCol:'#bbbbbb',cCol:'#ffe040'},
  {name:'🌿 第二关·木',bg:'#90c878',gCol:'#3a6020',pCol:'#7a4020',tCol:'#205010',cCol:'#80ff60'},
  {name:'💧 第三关·水',bg:'#60a8e0',gCol:'#1840a0',pCol:'#3090d0',tCol:'#0020c0',cCol:'#40e8ff'},
  {name:'🔥 第四关·火',bg:'#e08820',gCol:'#800800',pCol:'#cc2000',tCol:'#ff1800',cCol:'#ffaa00'},
  {name:'🌍 第五关·土',bg:'#c0a060',gCol:'#5a3010',pCol:'#806020',tCol:'#402000',cCol:'#ffcc80'},
];

// 移动尖刺：{x,y,w,h, x0,x1,spd,dir}  在平台上水平移动
function mkLevels(){return[
  // ── 1关·金：简单，宽平台，少陷阱 ─────────────────────────
  {
    floors:[
      {x:0,  y:GY,w:480,h:32},
      {x:64, y:224,w:112,h:16},
      {x:240,y:192,w:112,h:16},
      {x:368,y:224,w:112,h:16},
    ],
    traps:[
      {x:160,y:272,w:32,h:16},
      {x:272,y:272,w:32,h:16},
    ],
    mtraps:[],
    coins:[{x:96,y:196},{x:272,y:164},{x:400,y:196},{x:208,y:260}],
    flag:{x:440,y:192},spawn:{x:16,y:248},
  },
  // ── 2关·木：平缓递进，平台宽敞，陷阱远离跳台 ────────────
  {
    floors:[
      {x:0,  y:GY,w:480,h:32},   // 大地
      {x:48, y:240,w:112,h:16},  // 低台1（宽，易落脚）
      {x:224,y:216,w:112,h:16},  // 中台
      {x:352,y:240,w:128,h:16},  // 低台2（终点区，宽）
    ],
    traps:[
      // 只在地面中段放，远离所有平台正下方
      {x:176,y:272,w:32,h:16},
      {x:320,y:272,w:32,h:16},
    ],
    mtraps:[],
    coins:[{x:80,y:208},{x:264,y:184},{x:384,y:208},{x:176,y:260}],
    flag:{x:448,y:208},spawn:{x:16,y:248},
  },
  // ── 3关·水：浮冰跳台，S形路线，陷阱远离平台 ──────────────
  {
    floors:[
      {x:0,  y:GY,w:480,h:32},   // 大地
      {x:48, y:248,w:96, h:16},  // 低台1
      {x:192,y:224,w:96, h:16},  // 中台1
      {x:96, y:192,w:96, h:16},  // 中台2（往左上跳）
      {x:256,y:168,w:96, h:16},  // 高台
      {x:368,y:216,w:112,h:16},  // 终点台（宽）
    ],
    traps:[
      // 只在地面空旷区，远离所有平台
      {x:160,y:272,w:32,h:16},
      {x:336,y:272,w:32,h:16},
    ],
    mtraps:[],
    coins:[
      {x:80, y:216},  // 低台上方
      {x:224,y:192},  // 中台上方
      {x:128,y:160},  // 左高台
      {x:288,y:136},  // 高台顶
      {x:400,y:184},  // 终点台
    ],
    flag:{x:448,y:184},spawn:{x:16,y:248},
  },
  // ── 4关·火：岩浆地形＋弹跳路线＋1个移动尖刺巡逻 ──────────
  {
    floors:[
      {x:0,  y:GY,w:128,h:32},   // 左地
      {x:192,y:GY,w:96, h:32},   // 中地岛
      {x:368,y:GY,w:112,h:32},   // 右地
      {x:64, y:240,w:96, h:16},  // 低台
      {x:208,y:208,w:96, h:16},  // 中台
      {x:336,y:176,w:96, h:16},  // 高台（终点区）
    ],
    traps:[
      // 地面坑边缘，不在平台正下方
      {x:128,y:272,w:64,h:16},   // 左坑右边缘
      {x:288,y:272,w:80,h:16},   // 中岛右边缘到右地左缘
    ],
    mtraps:[
      // 中地岛上巡逻，速度慢，易观察
      {x:208,y:192,w:28,h:16, x0:192,x1:268,spd:1.0,dir:1},
    ],
    coins:[
      {x:80, y:208},
      {x:224,y:176},
      {x:160,y:260},  // 低台旁地面
      {x:352,y:144},
      {x:400,y:260},  // 右地上
    ],
    flag:{x:416,y:144},spawn:{x:16,y:248},
  },
  // ── 5关·土：多层阶梯＋2个移动尖刺＋藏币 ─────────────────
  {
    floors:[
      {x:0,  y:GY,w:480,h:32},   // 大地
      {x:32, y:248,w:96, h:16},  // 台1
      {x:176,y:224,w:96, h:16},  // 台2
      {x:288,y:192,w:80, h:16},  // 台3
      {x:160,y:160,w:80, h:16},  // 台4（往左上绕）
      {x:48, y:192,w:80, h:16},  // 台5
      {x:352,y:160,w:128,h:16},  // 终点台（宽）
    ],
    traps:[
      // 地面两处，远离平台
      {x:128,y:272,w:48,h:16},
      {x:256,y:272,w:32,h:16},
    ],
    mtraps:[
      // 台2上慢速巡逻
      {x:176,y:208,w:28,h:16, x0:176,x1:248,spd:1.1,dir:1},
      // 台3上反向巡逻
      {x:320,y:176,w:28,h:16, x0:288,x1:352,spd:1.3,dir:-1},
    ],
    coins:[
      {x:64, y:216},  // 台1
      {x:200,y:192},  // 台2
      {x:80, y:160},  // 台5上方（绕路奖励）
      {x:176,y:128},  // 台4顶（高处隐藏币）
      {x:384,y:128},  // 终点台上方
    ],
    flag:{x:448,y:128},spawn:{x:16,y:248},
  },
];}

// ── 游戏状态 ──────────────────────────────────────────────────
let world=0,lives=3,score=0;
let p,lvl,coinHit,activeMtraps;
let keys={L:false,R:false,J:false};
let canJump=true;
let phase='start';
let phaseTimer=0;
let particles=[];
let allLevels;

function initAll(){allLevels=mkLevels();}

function startLevel(){
  lvl=JSON.parse(JSON.stringify(allLevels[world]));
  coinHit=new Array(lvl.coins.length).fill(false);
  activeMtraps=allLevels[world].mtraps.map(m=>({...m}));
  p={x:lvl.spawn.x,y:lvl.spawn.y,w:20,h:28,vx:0,vy:0,onGround:false};
  particles=[];
  // 重置所有按键状态，防止死亡后残留输入
  keys.L=false; keys.R=false; keys.J=false;
  canJump=true;
  phase='play';
}

function puff(x,y,col,n){
  for(let i=0;i<(n||10);i++){
    const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:28,max:28,col});
  }
}

function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function updateMtraps(){
  for(const m of activeMtraps){
    m.x+=m.spd*m.dir;
    if(m.dir===1 && m.x+m.w>=m.x1){ m.x=m.x1-m.w; m.dir=-1; }
    else if(m.dir===-1 && m.x<=m.x0){ m.x=m.x0; m.dir=1; }
  }
}

function update(){
  if(phase==='dying'){
    phaseTimer--;
    if(phaseTimer<=0){if(lives>0)startLevel();else phase='gameover';}
    tickParticles();return;
  }
  if(phase==='win'){
    phaseTimer--;
    if(phaseTimer<=0){
      world++;
      if(world>=themes.length){phase='clear';return;}
      lives=3;updateHUD();startLevel();
    }
    tickParticles();return;
  }
  if(phase!=='play')return;

  updateMtraps();

  if(keys.L)p.vx=-3.5;
  else if(keys.R)p.vx=3.5;
  else p.vx*=0.55;

  if(keys.J&&p.onGround&&canJump){p.vy=-10;p.onGround=false;canJump=false;}
  if(!keys.J)canJump=true;

  p.vy=Math.min(p.vy+0.55,14);
  p.onGround=false;

  p.x+=p.vx;
  for(const f of lvl.floors){
    if(p.x<f.x+f.w&&p.x+p.w>f.x&&p.y<f.y+f.h&&p.y+p.h>f.y){
      if(p.vx>0)p.x=f.x-p.w;else if(p.vx<0)p.x=f.x+f.w;
      p.vx=0;
    }
  }
  p.x=Math.max(0,Math.min(W-p.w,p.x));

  p.y+=p.vy;
  for(const f of lvl.floors){
    if(p.x<f.x+f.w-2&&p.x+p.w>f.x+2&&p.y<f.y+f.h&&p.y+p.h>f.y){
      if(p.vy>=0&&p.y+p.h-p.vy<=f.y+8){p.y=f.y-p.h;p.vy=0;p.onGround=true;}
      else if(p.vy<0){p.y=f.y+f.h;p.vy=0;}
    }
  }

  if(p.y>H+20){doDie();return;}

  // 固定尖刺
  for(const t of lvl.traps){
    if(hit({x:p.x,y:p.y,w:p.w,h:p.h},t)){doDie();return;}
  }
  // 移动尖刺
  for(const m of activeMtraps){
    if(hit({x:p.x,y:p.y,w:p.w,h:p.h},m)){doDie();return;}
  }

  // 金币
  for(let i=0;i<lvl.coins.length;i++){
    if(coinHit[i])continue;
    const c=lvl.coins[i];
    if(Math.abs(p.x+p.w/2-(c.x+10))<18&&Math.abs(p.y+p.h/2-(c.y+10))<18){
      coinHit[i]=true;score+=10;
      puff(c.x+10,c.y+10,themes[world].cCol,8);
      updateHUD();
    }
  }

  // 旗帜
  const fl=lvl.flag;
  if(hit({x:p.x,y:p.y,w:p.w,h:p.h},{x:fl.x,y:fl.y-40,w:24,h:60})){
    puff(fl.x+10,fl.y,'#ffffff',20);
    phase='win';phaseTimer=80;
  }

  tickParticles();
}

function doDie(){
  if(phase!=='play')return;
  puff(p.x+p.w/2,p.y+p.h/2,'#ff4444',14);
  lives--;updateHUD();
  phase='dying';phaseTimer=60;
}

function tickParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.18;pt.life--;
    if(pt.life<=0)particles.splice(i,1);
  }
}

// ── 渲染 ──────────────────────────────────────────────────────
function drawSpikes(tx,ty,tw,th,col){
  g.fillStyle=col;
  const n=Math.max(1,Math.floor(tw/16));
  const sw=tw/n;
  for(let i=0;i<n;i++){
    g.beginPath();
    g.moveTo(tx+i*sw,ty+th);
    g.lineTo(tx+i*sw+sw/2,ty);
    g.lineTo(tx+(i+1)*sw,ty+th);
    g.closePath();g.fill();
  }
}

function drawScene(){
  const th=themes[world];
  g.fillStyle=th.bg;g.fillRect(0,0,W,H);

  // 平台
  for(const f of lvl.floors){
    const isGnd=(f.y===GY&&f.w>200);
    g.fillStyle=isGnd?th.gCol:th.pCol;
    g.fillRect(f.x,f.y,f.w,f.h);
    g.fillStyle='rgba(255,255,255,0.2)';g.fillRect(f.x,f.y,f.w,3);
    g.fillStyle='rgba(0,0,0,0.25)';g.fillRect(f.x,f.y+f.h-3,f.w,3);
    g.strokeStyle='rgba(0,0,0,0.15)';g.lineWidth=1;
    for(let bx=f.x;bx<f.x+f.w;bx+=TS){g.beginPath();g.moveTo(bx,f.y);g.lineTo(bx,f.y+f.h);g.stroke();}
  }

  // 固定尖刺
  for(const t of lvl.traps) drawSpikes(t.x,t.y,t.w,t.h,th.tCol);

  // 移动尖刺（发光效果）
  for(const m of activeMtraps){
    // 橙色光晕
    g.save();
    g.shadowColor='#ff6600';
    g.shadowBlur=10;
    drawSpikes(m.x,m.y,m.w,m.h,'#ff3300');
    // 白色高光尖端
    g.shadowBlur=0;
    const n=Math.max(1,Math.floor(m.w/16));
    const sw=m.w/n;
    g.fillStyle='rgba(255,200,100,0.7)';
    for(let i=0;i<n;i++){
      g.beginPath();
      g.arc(m.x+i*sw+sw/2, m.y+2, 2, 0, Math.PI*2);
      g.fill();
    }
    g.restore();
  }

  // 金币
  for(let i=0;i<lvl.coins.length;i++){
    if(coinHit[i])continue;
    const c=lvl.coins[i];
    g.beginPath();g.arc(c.x+10,c.y+10,9,0,Math.PI*2);
    g.fillStyle=th.cCol;g.fill();
    g.strokeStyle='rgba(255,255,255,0.7)';g.lineWidth=2;g.stroke();
    g.beginPath();g.arc(c.x+6,c.y+6,3,0,Math.PI*2);
    g.fillStyle='rgba(255,255,255,0.6)';g.fill();
    g.lineWidth=1;
  }

  // 旗帜
  const fl=lvl.flag;
  g.fillStyle='#888';g.fillRect(fl.x+8,fl.y-48,4,60);
  g.fillStyle='#e74c3c';
  g.beginPath();
  g.moveTo(fl.x+12,fl.y-48);g.lineTo(fl.x+34,fl.y-36);g.lineTo(fl.x+12,fl.y-24);
  g.closePath();g.fill();
  g.fillStyle='#666';g.fillRect(fl.x+4,fl.y+8,16,6);

  // 小人
  if(phase==='play'||phase==='win') drawPlayer();

  // 粒子
  for(const pt of particles){
    g.globalAlpha=pt.life/pt.max;
    g.fillStyle=pt.col;
    g.fillRect(pt.x-3,pt.y-3,6,6);
  }
  g.globalAlpha=1;
}

function drawPlayer(){
  const x=p.x,y=p.y,w=p.w,h=p.h;
  const dir=p.vx<-0.3?-1:1;
  g.save();
  g.translate(x+w/2,y);
  g.scale(dir,1);
  g.fillStyle='#1a2a3a';
  g.fillRect(-8,h-10,7,10);
  g.fillRect(1,h-10,7,10);
  g.fillStyle='#2980b9';
  g.fillRect(-9,h*0.38,18,h*0.5);
  g.fillStyle='#f5c99a';
  g.fillRect(-7,0,14,h*0.42);
  g.fillStyle='#4a2800';
  g.fillRect(-7,0,14,5);
  g.fillStyle='#222';
  g.fillRect(1,5,4,4);
  g.fillStyle='#c0705a';
  g.fillRect(0,h*0.3,5,2);
  g.restore();
}

function drawOverlay(title,msg,sub){
  g.fillStyle='rgba(0,0,0,0.65)';g.fillRect(0,0,W,H);
  g.fillStyle='#fff';g.font='bold 26px Arial';g.textAlign='center';
  g.fillText(title,W/2,H/2-40);
  g.font='16px Arial';g.fillStyle='#ddd';g.fillText(msg,W/2,H/2);
  if(sub){g.font='14px Arial';g.fillStyle='#f1c40f';g.fillText(sub,W/2,H/2+30);}
  g.textAlign='left';
}

function render(){
  if(phase==='start'){
    g.fillStyle='#111';g.fillRect(0,0,W,H);
    drawOverlay('⚔️ 五行闯关','金·木·水·火·土 五大世界','点击屏幕开始');return;
  }
  if(phase==='gameover'){
    g.fillStyle='#111';g.fillRect(0,0,W,H);
    drawOverlay('💀 游戏结束','生命耗尽！得分：'+score,'点击屏幕重新开始');return;
  }
  if(phase==='clear'){
    g.fillStyle='#111';g.fillRect(0,0,W,H);
    drawOverlay('🎉 恭喜通关！','穿越了五行世界！最终得分：'+score,'点击屏幕再玩一次');return;
  }

  drawScene();

  if(phase==='dying') drawOverlay(lives>0?'💥 继续加油':'💀 游戏结束',lives>0?'重新挑战本关...':'','');
  if(phase==='win'&&world<themes.length-1) drawOverlay('✨ 过关！','进入下一关...','');

  if(phase==='play'){
    // 关卡难度提示
    const tips=['⚔️ 关卡一·金：热身起步','🌿 关卡二·木：间距变大','💧 关卡三·水：精准跳跃','🔥 关卡四·火：小心移动尖刺！','🌍 关卡五·土：终极挑战！'];
    g.fillStyle='rgba(0,0,0,0.45)';g.fillRect(0,H-20,W,20);
    g.fillStyle='#fff';g.font='11px Arial';
    g.fillText(tips[world],8,H-5);
  }
}

function loop(){update();render();requestAnimationFrame(loop);}

function updateHUD(){
  document.getElementById('hLv').textContent=themes[world].name;
  document.getElementById('hHp').textContent='❤️'.repeat(Math.max(0,lives));
  document.getElementById('hSc').textContent='💰 '+score;
}

function tap(){
  if(phase==='start'){initAll();startLevel();updateHUD();return;}
  if(phase==='gameover'){world=0;lives=3;score=0;initAll();startLevel();updateHUD();return;}
  if(phase==='clear'){world=0;lives=3;score=0;initAll();startLevel();updateHUD();return;}
}

cv.addEventListener('pointerdown',tap);

function hold(id,k){document.getElementById(id).addEventListener('pointerdown',e=>{e.preventDefault();if(phase!=='play'){tap();return;}keys[k]=true;});}
function rel(id,k){document.getElementById(id).addEventListener('pointerup',()=>keys[k]=false);document.getElementById(id).addEventListener('pointerleave',()=>keys[k]=false);}
hold('bl','L');rel('bl','L');
hold('br','R');rel('br','R');
hold('bj','J');rel('bj','J');

document.addEventListener('keydown',e=>{
  if(phase!=='play'&&(e.key===' '||e.key==='Enter')){tap();return;}
  if(e.key==='ArrowLeft'||e.key==='a')keys.L=true;
  if(e.key==='ArrowRight'||e.key==='d')keys.R=true;
  if((e.key===' '||e.key==='ArrowUp'||e.key==='w')&&!e.repeat)keys.J=true;
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')keys.L=false;
  if(e.key==='ArrowRight'||e.key==='d')keys.R=false;
  if(e.key===' '||e.key==='ArrowUp'||e.key==='w')keys.J=false;
});

initAll();loop();
</script>
</body>
</html>
